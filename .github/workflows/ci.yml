name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Rust — Format, Clippy, Test, Build (Linux + macOS)
  # ═══════════════════════════════════════════════════════════════════════════
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update -qq
          sudo apt install -y -qq libssl-dev pkg-config

      - name: Check formatting (fmt)
        run: cargo fmt --all -- --check

      - name: Clippy (strict)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Build (release)
        run: cargo build --release --workspace

  # ═══════════════════════════════════════════════════════════════════════════
  # Python — Test eo-agent (Linux)
  # ═══════════════════════════════════════════════════════════════════════════
  python:
    name: Python eo-agent (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: eo-agent
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install eo-agent + deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test (mock mode)
        env:
          EO_MOCK_MODE: "true"
        run: python -m pytest tests/ -v
